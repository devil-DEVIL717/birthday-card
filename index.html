<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Definitely Normal Birthday Card</title>

<style>

body{
    margin:0;
    height:100vh;
    overflow:hidden;

    /* CHANGE THIS TO YOUR IMAGE */
    background:url("background.jpg");

    background-size:cover;
    background-position:center;

    font-family:Comic Sans MS,cursive;
    text-align:center;
}

h1{
    margin-top:50px;
    color:white;
    text-shadow:3px 3px 5px black;
    transform:rotate(-3deg);
}

#giftBtn{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    padding:20px;
    font-size:25px;
    cursor:pointer;
}

.fakeBtn{
    position:absolute;
    padding:10px;
}

#message{
    display:none;
    margin-top:100px;
    background:white;
    width:70%;
    margin-left:auto;
    margin-right:auto;
    padding:20px;
    border-radius:20px;
    transform:rotate(2deg);
}

.spin{
    animation:spin 2s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

</style>
</head>

<body>

<h1 class="spin">🎉 TOTALLY SERIOUS BIRTHDAY CARD 🎉</h1>

<button id="giftBtn">
🎁 OPEN GIFT
</button>

<button class="fakeBtn" style="top:20%;left:10%">
DO NOT CLICK
</button>

<button class="fakeBtn" style="top:70%;left:80%">
FREE MONEY
</button>

<button class="fakeBtn" style="top:30%;left:75%">
100% SAFE
</button>

<div id="message">
<h2>🎂 HAPPY BIRTHDAY 🎂</h2>

<p>
I made you click a button for no reason.
</p>

<p>
Hope your day is full of cake,
laughter and absolutely zero homework.
</p>

<p>
Have an awesome birthday! 🎉🎈🎂
</p>
</div>

<script>

const btn=document.getElementById("giftBtn");

let escapes=0;

btn.addEventListener("mouseover",()=>{

    if(escapes<8){

        btn.style.left=
        Math.random()*80+10+"%";

        btn.style.top=
        Math.random()*80+10+"%";

        escapes++;

    }else{

        btn.innerHTML="Fine. You Win.";

    }

});

btn.addEventListener("click",()=>{

    document.getElementById("message").style.display="block";

    btn.style.display="none";

    for(let i=0;i<20;i++){

        const emoji=document.createElement("div");

        emoji.innerHTML="🎉";

        emoji.style.position="absolute";

        emoji.style.left=Math.random()*100+"vw";

        emoji.style.top=Math.random()*100+"vh";

        emoji.style.fontSize="40px";

        document.body.appendChild(emoji);

    }

});

document.querySelectorAll(".fakeBtn").forEach(button=>{

    button.onclick=()=>{

        const messages=[
            "Nice try.",
            "That button is useless.",
            "Wrong button.",
            "Keep searching.",
            "Why would you click that?"
        ];

        alert(
            messages[
                Math.floor(Math.random()*messages.length)
            ]
        );

    };

});

</script>

</body>
</html>
